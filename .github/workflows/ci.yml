name: CI Build & Release

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 9
        
    - name: Use Node.js 25.2.1
      uses: actions/setup-node@v6
      with:
        node-version: 25.2.1
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Typecheck
      run: pnpm run compile
      
    - name: Build Extension Zip
      run: pnpm run zip

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v7
      with:
        name: extension-build-node-25.2.1
        path: "**/*.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only run the release job if a tag starting with 'v' (e.g. v1.0.0) is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 9
        
    - name: Use Node.js 25.2.1
      uses: actions/setup-node@v6
      with:
        node-version: 25.2.1
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Build Extension Zip
      run: pnpm run zip

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: "**/*.zip"
        generate_release_notes: true
